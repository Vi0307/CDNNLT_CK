<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog2Cast | Premium AI Podcast</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #8b5cf6;
            --primary-dark: #7c3aed;
            --accent: #f43f5e;
            --bg-color: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(139, 92, 246, 0.15), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(244, 63, 94, 0.15), transparent 25%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 650px;
            padding: 20px;
            box-sizing: border-box;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            margin: 0;
            background: linear-gradient(to right, #a78bfa, #f43f5e);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
            margin-top: 8px;
        }

        .input-group input {
            width: 100%;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 16px 20px;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            box-sizing: border-box;
            margin-bottom: 20px;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 2px rgba(139, 92, 246, 0.3);
        }

        .config-row {
            display: flex;
            gap: 16px;
            margin-bottom: 24px;
        }

        .config-row select {
            flex: 1;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 14px 16px;
            border-radius: 12px;
            font-size: 1rem;
            outline: none;
            cursor: pointer;
        }

        .btn-primary {
            width: 100%;
            background: linear-gradient(to right, var(--primary), var(--accent));
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(244, 63, 94, 0.4);
        }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-area {
            display: none;
            flex-direction: column;
            gap: 16px;
            margin-top: 32px;
            background: rgba(0,0,0,0.2);
            padding: 24px;
            border-radius: 16px;
        }

        .step-item {
            display: flex;
            align-items: center;
            gap: 16px;
            opacity: 0.5;
            transition: all 0.3s ease;
        }

        .step-item.active {
            opacity: 1;
            animation: pulse 2s infinite;
        }

        .step-item.completed {
            opacity: 1;
        }

        .step-item.completed .step-icon {
            background: #10b981;
            color: white;
            border-color: #10b981;
        }

        .step-icon {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid var(--text-muted);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--text-muted);
            transition: all 0.3s ease;
        }

        .step-text h4 {
            margin: 0;
            font-weight: 500;
        }

        .result-area {
            display: none;
            flex-direction: column;
            gap: 24px;
            margin-top: 32px;
            animation: slideUp 0.5s ease-out;
        }

        .podcast-player audio {
            width: 100%;
            border-radius: 12px;
            outline: none;
        }

        .summary-card {
            background: rgba(15, 23, 42, 0.6);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            line-height: 1.6;
            color: #e2e8f0;
            font-size: 0.95rem;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.02); }
            100% { transform: scale(1); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="glass-card">
            <header>
                <h1>Blog2Cast</h1>
                <p class="subtitle">Premium AI Podcast Generator</p>
            </header>
            <main>
                <div class="input-group">
                    <input type="text" id="articleUrl" placeholder="Dán link bài báo vào đây..." autocomplete="off">
                </div>
                <div class="config-row">
                    <select id="voiceProfile">
                        <option value="vi-VN-HoaiMyNeural">Hoài My (Nữ)</option>
                        <option value="vi-VN-NamMinhNeural">Nam Minh (Nam)</option>
                    </select>
                    <select id="outputLanguage">
                        <option value="vi">Tiếng Việt</option>
                        <option value="en">English</option>
                    </select>
                </div>
                <button id="generateBtn" type="button" class="btn-primary">
                    <span class="btn-text">Bắt đầu chuyển đổi</span>
                    <div class="spinner" id="btnSpinner"></div>
                </button>
                <div id="statusArea" class="status-area">
                    <div class="step-item" id="step-crawl">
                        <div class="step-icon">1</div>
                        <div class="step-text"><h4>Đang đọc nội dung</h4></div>
                    </div>
                    <div class="step-item" id="step-ai">
                        <div class="step-icon">2</div>
                        <div class="step-text"><h4>AI đang xử lý</h4></div>
                    </div>
                    <div class="step-item" id="step-tts">
                        <div class="step-icon">3</div>
                        <div class="step-text"><h4>Đang tạo giọng nói</h4></div>
                    </div>
                </div>
                <div id="resultArea" class="result-area">
                    <div class="podcast-player">
                        <audio id="audioPlayer" controls></audio>
                    </div>
                    <div class="summary-card" id="summaryText"></div>
                </div>
            </main>
        </div>
    </div>

    <script>
        const CONFIG = {
            API_GATEWAY: 'http://localhost:8005/api/generate-podcast',
            BASE_URL: 'http://localhost:8005'
        };

        const generateBtn = document.getElementById('generateBtn');
        const articleUrlInput = document.getElementById('articleUrl');
        const voiceSelect = document.getElementById('voiceProfile');
        const langSelect = document.getElementById('outputLanguage');
        const statusArea = document.getElementById('statusArea');
        const resultArea = document.getElementById('resultArea');
        const audioPlayer = document.getElementById('audioPlayer');
        const summaryText = document.getElementById('summaryText');

        const steps = {
            crawl: document.getElementById('step-crawl'),
            ai: document.getElementById('step-ai'),
            tts: document.getElementById('step-tts')
        };

        // Reset step indicators
        const resetSteps = () => {
            Object.values(steps).forEach(step => {
                step.classList.remove('active');
                step.classList.remove('completed');
            });
        };

        generateBtn.addEventListener('click', async () => {
            const url = articleUrlInput.value.trim();
            if (!url) return alert('Vui lòng nhập URL bài báo');

            document.getElementById('btnSpinner').style.display = 'inline-block';
            statusArea.style.display = 'flex';
            resultArea.style.display = 'none';
            resetSteps();

            try {
                // Hiển thị đang xử lý cho tất cả các bước vì API Gateway xử lý gộp
                steps.crawl.classList.add('active');
                steps.ai.classList.add('active');
                steps.tts.classList.add('active');

                const response = await fetch(CONFIG.API_GATEWAY, {
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        url: url,
                        language: langSelect.value, 
                        voice: voiceSelect.value
                    })
                });

                if (!response.ok) {
                    const errorData = await response.json().catch(() => ({}));
                    throw new Error(errorData.detail || 'Có lỗi xảy ra trong quá trình xử lý');
                }
                
                const data = await response.json();
                
                // Đánh dấu hoàn thành
                steps.crawl.classList.replace('active', 'completed');
                steps.ai.classList.replace('active', 'completed');
                steps.tts.classList.replace('active', 'completed');
                
                if(data.status === 'success') {
                    // Update UI with results
                    audioPlayer.src = CONFIG.BASE_URL + data.audio_url;
                    summaryText.innerText = data.summary;
                    resultArea.style.display = 'flex';
                } else {
                    throw new Error('Chuyển đổi thất bại');
                }
            } catch (e) {
                alert('Lỗi: ' + e.message);
                resetSteps();
                statusArea.style.display = 'none';
            } finally {
                document.getElementById('btnSpinner').style.display = 'none';
            }
        });
    </script>
</body>
</html>
