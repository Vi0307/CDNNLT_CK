<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thư viện Podcast - Blog2Cast</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css?v=4">
    <style>
        .library-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
            width: 100%;
        }
        
        .podcast-card {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            padding: 1.5rem;
            position: relative;
        }

        .podcast-card h3 {
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            color: var(--primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .podcast-meta {
            font-size: 0.85rem;
            color: var(--text-muted);
            display: flex;
            justify-content: space-between;
            margin-bottom: 0.5rem;
        }
        
        .podcast-url {
            font-size: 0.85rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: block;
            text-decoration: none;
        }
        
        .podcast-url:hover {
            color: var(--primary);
            text-decoration: underline;
        }

        .delete-btn {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(255, 61, 0, 0.1);
            color: var(--error);
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .delete-btn:hover {
            background: var(--error);
            color: white;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
            width: 100%;
            grid-column: 1 / -1;
        }
        
        .empty-state i {
            font-size: 3rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="bg-effects">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
        <div class="grid-overlay"></div>
    </div>

    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar glass-effect" style="border-radius: 0; border-top: none; border-bottom: none; border-left: none;">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fa-solid fa-podcast"></i>
                </div>
                <h1>Blog<span>2</span>Cast</h1>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item">
                    <i class="fa-solid fa-wand-magic-sparkles"></i>
                    <span>Tạo Podcast</span>
                </a>
                <a href="library.html" class="nav-item active">
                    <i class="fa-solid fa-book-bookmark"></i>
                    <span>Thư viện</span>
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <div class="main-content">
            <main class="app-container" style="max-width: 1200px;">
                <!-- Header -->
                <header class="app-header">
                    <h2 style="font-family: 'Outfit', sans-serif; font-size: 2.5rem; margin-bottom: 10px;">Thư viện Podcast</h2>
                    <p class="tagline">Quản lý và nghe lại các podcast đã lưu của bạn</p>
                </header>

        <!-- Library Content -->
        <section id="library-content" class="library-container">
            <!-- Cards will be populated by JS -->
        </section>

            </main>
        </div>
    </div>

    <!-- Script -->
    <script src="library.js"></script>
</body>
</html>
