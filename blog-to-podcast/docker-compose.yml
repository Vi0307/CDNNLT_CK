services:
  # ── API Gateway (điểm vào duy nhất cho browser/frontend) ──────────────
  api-gateway:
    build: ./services/api-gateway
    ports:
      - "8000:8000"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - CONTENT_SERVICE_URL=http://content-service:8001
      - PROCESS_SERVICE_URL=http://process-service:8002
      - TTS_SERVICE_URL=http://tts-service:8003
    depends_on:
      - content-service
      - process-service
      - tts-service
    volumes:
      - ./services/api-gateway/app:/app/app

  # ── Content Service (crawl URL) ────────────────────────────────────────
  content-service:
    build: ./services/content-service
    ports:
      - "8001:8001"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - USE_MOCK=${USE_MOCK:-false}
    volumes:
      - ./services/content-service/app:/app/app

  # ── Process Service (AI script) ────────────────────────────────────────
  process-service:
    build: ./services/process-service
    ports:
      - "8002:8002"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - USE_MOCK=${USE_MOCK:-false}
      - AI_SERVICE_URL=http://ai-service:8004
    volumes:
      - ./services/process-service/app:/app/app

  # ── AI Service (Anthropic/Claude) ──────────────────────────────────────
  ai-service:
    build: ./services/ai-service
    ports:
      - "8004:8004"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-https://1gw.gwai.cloud}
      - ANTHROPIC_MODEL=${ANTHROPIC_MODEL:-claude-sonnet-4-6}
      - AI_TIMEOUT=${AI_TIMEOUT:-60}
      - AI_PROVIDER=${AI_PROVIDER:-claude}
    volumes:
      - ./services/ai-service/app:/app/app

  # ── TTS Service (Google TTS / edge-tts) ───────────────────────────────
  tts-service:
    build: ./services/tts-service
    ports:
      - "8003:8003"
    dns:
      - 8.8.8.8
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - USE_MOCK=${USE_MOCK:-false}
      - AUDIO_DIR=${AUDIO_DIR:-audio_output}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    volumes:
      - ./services/tts-service/app:/app/app
      - ./services/tts-service/audio_output:/app/audio_output

networks:
  default:
    name: blog2cast-network
